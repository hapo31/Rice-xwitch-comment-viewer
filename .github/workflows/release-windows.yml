name: Release Windows

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Test and build Windows installer and zip
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: "1"
      RICE_TWITCH_CLIENT_ID: ${{ vars.RICE_TWITCH_CLIENT_ID || secrets.RICE_TWITCH_CLIENT_ID }}
    steps:
      - name: Checkout annotated tag
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # actions/checkout resolves tag events to the peeled commit and can replace
      # the local annotated tag ref with a lightweight tag. Restore the tag object
      # before validating and reading its annotation message.
      - name: Restore annotated tag object
        run: git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Verify annotated release tag
        run: scripts/verify-release-tag.sh "${GITHUB_REF_NAME}"

      - name: Enable pinned pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@8.11.0 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Test frontend and run TypeScript build
        run: |
          set -euo pipefail
          pnpm test
          pnpm build

      - name: Test Rust backend
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Build in Docker without shared caches
        run: |
          set -euo pipefail
          if [ -z "${RICE_TWITCH_CLIENT_ID}" ]; then
            echo "::warning::RICE_TWITCH_CLIENT_ID is not configured. The app will build, but Twitch login will show a setup error until a client ID is provided at build time."
          fi
          rm -rf release-artifacts
          mkdir -p release-artifacts
          docker build \
            --pull \
            --no-cache \
            --build-arg RICE_TWITCH_CLIENT_ID="${RICE_TWITCH_CLIENT_ID}" \
            --target artifacts \
            --output type=local,dest=release-artifacts \
            .

      - name: Verify artifacts and write checksums
        run: |
          set -euo pipefail
          find release-artifacts -maxdepth 1 -type f -print
          test -n "$(find release-artifacts -maxdepth 1 -type f -name '*.exe' -print -quit)"
          test -n "$(find release-artifacts -maxdepth 1 -type f -name '*.zip' -print -quit)"
          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rice-windows-${{ github.ref_name }}
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout release scripts
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download release artifact bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rice-windows-${{ github.ref_name }}
          path: release-artifacts

      - name: Create or update release safely
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish-release.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" release-artifacts/*
